server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    ssi on;
    ssi_silent_errors on;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSI subrequest — no header check
    location = /api/profile/og-meta {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Proxy API to backend — block direct browser access
    location /api/ {
        if ($http_x_requested_from != "imjemin-frontend") {
            return 403 "CANT";
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 5M;
    }

    # Proxy uploaded images to backend static files
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }
}
